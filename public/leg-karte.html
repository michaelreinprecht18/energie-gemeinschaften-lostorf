<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEG Trafo-Karte Lostorf</title>
<meta name="description" content="Interaktive Karte der 22 möglichen Trafo-Kreise für Lokale Elektrizitätsgemeinschaften (LEG) in Lostorf mit allen registrierten PV-Anlagen.">
<link rel="canonical" href="https://lostorf.solar/leg-karte.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans','Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#fff;color:#1A1510;padding:8px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:2px solid #D9CEB5}
.logo{font-size:15px;font-weight:700;color:#1A3317;white-space:nowrap;font-family:'DM Sans',sans-serif}
.hd-info{font-size:11px;color:#9A9089;line-height:1.3}
.hd-info strong{color:#1A1510}
.hd-stats{margin-left:auto;display:flex;gap:16px;align-items:center}
.hd-stat .n{font-size:16px;font-weight:700;line-height:1;font-family:'DM Sans',sans-serif}
.hd-stat .l{font-size:9px;color:#9A9089;text-transform:uppercase;letter-spacing:.5px}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid #D9CEB5;display:flex;flex-direction:column;overflow:hidden}
.sb{padding:9px 12px;border-bottom:1px solid #D9CEB5;flex-shrink:0}
.sb-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9A9089;margin-bottom:6px}
#status-bar{padding:6px 12px;background:#F5F0E8;border-bottom:1px solid #D9CEB5;font-size:11px;color:#9A7B2E;display:flex;align-items:center;gap:8px;flex-shrink:0}
#status-bar.done{background:#E7F9E4;color:#3A7A30;border-color:#B8D9B4}
.spin{width:12px;height:12px;border:2px solid #D9CEB5;border-top-color:#9A7B2E;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
#status-bar.done .spin{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.tk-scroll{max-height:185px;overflow-y:auto}
.tk-scroll::-webkit-scrollbar,.pv-scroll::-webkit-scrollbar{width:3px}
.tk-scroll::-webkit-scrollbar-thumb,.pv-scroll::-webkit-scrollbar-thumb{background:#D9CEB5;border-radius:2px}
.tk-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;font-size:11px;cursor:pointer;transition:background .1s;margin-bottom:2px;border:1px solid transparent}
.tk-item:hover{background:#F5F0E8}
.tk-item.active{background:#F5F0E8;border-color:var(--c)}
.tk-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tk-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#5C5248;font-size:11px}
.tk-stats{text-align:right;flex-shrink:0}
.tk-cnt{font-size:9px;color:#9A9089;display:block}
.tk-kw{font-size:9px;color:#9A7B2E;display:block;font-weight:600}
.tk-item.active .tk-name{color:var(--c);font-weight:600}
.pv-head{padding:7px 12px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #D9CEB5}
.pv-head .sb-title{margin:0}
#pv-search{width:90px;padding:2px 6px;border:1px solid #D9CEB5;border-radius:4px;font-size:10px;color:#1A1510;outline:none;font-family:'Nunito Sans',sans-serif}
#pv-search:focus{border-color:#9A7B2E}
.pv-scroll{flex:1;overflow-y:auto}
.pv-item{padding:5px 12px;border-bottom:1px solid #F0EBE0;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .1s}
.pv-item:hover{background:#F5F0E8}
.pv-item.active{background:#F5F0E8;border-left:3px solid #9A7B2E;padding-left:9px}
.pv-icon{font-size:13px;flex-shrink:0;line-height:1}
.pv-body{flex:1;min-width:0}
.pv-addr{font-size:11px;color:#1A1510;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-meta{font-size:10px;color:#9A9089;margin-top:1px}
.pv-tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#pv-empty{padding:20px 12px;text-align:center;font-size:11px;color:#9A9089;display:none}
.loader-wrap{padding:16px 12px;text-align:center}
.loader{width:18px;height:18px;border:2px solid #D9CEB5;border-top-color:#9A7B2E;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
.loader-txt{font-size:11px;color:#9A9089}
.map-wrap{flex:1;position:relative;display:flex;flex-direction:column;min-width:0}
#map{flex:1}
#tpanel{position:absolute;bottom:14px;left:14px;background:#fff;border:1px solid #D9CEB5;border-radius:12px;box-shadow:0 4px 20px rgba(26,21,16,.1);padding:11px 14px;min-width:200px;z-index:800;display:none}
.tp-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.tp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tp-name{font-weight:700;font-size:13px;color:#1A1510;font-family:'DM Sans',sans-serif}
.tp-info{font-size:11px;color:#5C5248}
.tp-close{position:absolute;top:7px;right:9px;background:none;border:none;cursor:pointer;color:#9A9089;font-size:17px;line-height:1;padding:2px}
.tp-close:hover{color:#1A1510}
.leaflet-popup-content-wrapper{border-radius:10px;box-shadow:0 4px 16px rgba(26,21,16,.1)}
.leaflet-popup-content{margin:9px 13px;font-size:12.5px;line-height:1.5;font-family:'Nunito Sans',sans-serif}
.pp-title{font-weight:700;font-size:13px;color:#1A1510;margin-bottom:3px;font-family:'DM Sans',sans-serif}
.pp-badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:700;margin-bottom:3px}
.pp-pv{background:#F5F0E8;color:#7E6424;border:1px solid #D9CEB5}
#toast{position:fixed;bottom:16px;right:16px;background:#1A1510;color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;border-left:3px solid #9DD295;box-shadow:0 3px 12px rgba(0,0,0,.2);display:none;z-index:9999}
</style>
</head>
<body>
<header>
  <div class="logo">⚡ LEG Trafo-Karte Lostorf</div>
  <div class="hd-info"><strong>21 mögliche Lokale Elektrizitätsgemeinschaften</strong><br>Klick auf Trafo-Kreis oder PV-Anlage für Details</div>
  <div class="hd-stats">
    <div class="hd-stat"><div class="n" id="h-pv" style="color:#9A7B2E">–</div><div class="l">PV Anlagen</div></div>
    <div class="hd-stat"><div class="n" id="h-trafo" style="color:#3A7A30">22</div><div class="l">Trafo-Kreise</div></div>
    <div class="hd-stat"><div class="n" id="h-match" style="color:#9DD295">–</div><div class="l">Gematcht</div></div>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div id="status-bar"><div class="spin"></div><span id="status-txt">Lade PV-Daten...</span></div>
    <div class="sb">
      <div class="sb-title">Trafo-Kreise (22)</div>
      <div class="tk-scroll" id="tk-list"></div>
    </div>
    <div class="pv-head">
      <div class="sb-title">PV Anlagen</div>
      <input type="text" id="pv-search" placeholder="Suche..." oninput="filterPV(this.value)">
    </div>
    <div class="pv-scroll">
      <div class="loader-wrap" id="pv-loader"><div class="loader"></div><div class="loader-txt">Wird geladen...</div></div>
      <div id="pv-list"></div>
      <div id="pv-empty">Keine Treffer</div>
    </div>
  </div>
  <div class="map-wrap">
    <div id="map"></div>
    <div id="tpanel">
      <button class="tp-close" onclick="closePanel()">×</button>
      <div class="tp-header"><div class="tp-dot" id="tp-dot"></div><div class="tp-name" id="tp-name"></div></div>
      <div class="tp-info" id="tp-info"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

, "nr": "20"}, {"street": "Hangstrasse", "nr": "4"}, {"street": "Hangstrasse", "nr": "3"}, {"street": "Hangstrasse", "nr": "2"}, {"street": "Lindenstrasse", "nr": "5"}, {"street": "Lindenstrasse", "nr": "6"}, {"street": "Lindenstrasse", "nr": "1"}, {"street": "Lindenstrasse", "nr": "3"}, {"street": "Lindenstrasse", "nr": "4"}, {"street": "Lindenstrasse", "nr": "2"}, {"street": "Rebenfeldstrasse", "nr": "7"}, {"street": "Rebenfeldstrasse", "nr": "30"}, {"street": "Rebenfeldstrasse", "nr": "22"}, {"street": "Rebenfeldstrasse", "nr": "38"}, {"street": "Rebenfeldstrasse", "nr": "20"}, {"street": "Rebenfeldstrasse", "nr": "32"}, {"street": "Rebenfeldstrasse", "nr": "1"}, {"street": "Rebenfeldstrasse", "nr": "3"}, {"street": "Kaltstrasse", "nr": "11"}, {"street": "Weinbergstrasse", "nr": "2"}]}];
const BFE_URL='https://api3.geo.admin.ch/rest/services/api/MapServer/find?layer=ch.bfe.elektrizitaetsproduktionsanlagen&searchField=address&searchText=Lostorf&contains=true&returnGeometry=true&lang=de&sr=4326';
const GEO_URL='https://api3.geo.admin.ch/rest/services/api/SearchServer';
const CACHE_PV='pv_lostorf_v8';
const CACHE_GEO='geo_cache_v4';

let pvData=[],pvMarkers={},activeTrafoName=null,activeMarkers=[],geoCache={};

const map=L.map('map').setView([47.448,7.948],14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

function pvIcon(color){
  const glow=color?`0 0 0 4px ${color}30,`:'';
  return L.divIcon({
    html:`<div style="width:22px;height:22px;background:#f0c040;border:2px solid #92400e;border-radius:50%;box-shadow:${glow}0 2px 8px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1">☀</div>`,
    className:'',iconSize:[22,22],iconAnchor:[11,11]
  });
}
function houseIcon(color){
  return L.divIcon({
    html:`<div style="width:15px;height:15px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,
    className:'',iconSize:[15,15],iconAnchor:[7,7]
  });
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function loadGeoCache(){try{geoCache=JSON.parse(localStorage.getItem(CACHE_GEO)||'{}')}catch(e){}}
function saveGeoCache(){try{localStorage.setItem(CACHE_GEO,JSON.stringify(geoCache))}catch(e){}}

async function geocode(street,nr,ort){
  const k=street+'|'+nr;
  if(geoCache[k]) return geoCache[k];
  try{
    const q=encodeURIComponent(street+' '+nr+' '+ort);
    const r=await fetch(GEO_URL+'?searchText='+q+'&type=locations&limit=1&sr=4326');
    const d=await r.json();
    if(d.results&&d.results.length){
      const a=d.results[0].attrs;
      if(a.lat&&a.lon){geoCache[k]={lat:a.lat,lon:a.lon};return geoCache[k];}
    }
  }catch(e){}
  return null;
}

function norm(s){return(s||'').toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/[^a-z0-9]/g,'');}
function normNr(s){return norm((s||'').replace(/[a-zA-Z]+$/,''));}

const PV_REMAP={
  'wartenfelsstrasse|24': {street:'Wartenfelsstrasse', nr:'20'},
  'zehntenweg|2':         {street:'Zehntenweg',        nr:'4'},
  'hangstrasse|10':       {street:'Hangstrasse',       nr:'16'},
  'hauptstrasse|32':      {street:'Hauptstrasse',      nr:'34'},
  'trottenackerstrasse|5':{street:'Hauptstrasse',      nr:'34'},
  'mahrenstrasse|140':    {street:'Mahrenstrasse',     nr:'142'},
  'bornweg|5':            {street:'Bornweg',           nr:'3'},
  'laebertenstrasse|15':  {street:'Juraweg',           nr:'17'},
  'saelisstrasse|34':     {street:'Sälisstrasse',      nr:'34'},
};

function findTrafo(pv){
  if(!pv.street) return null;
  const ps=norm(pv.street);
  const rawNr=(pv.nr||'').split(/[\s+]/)[0];
  const pn=norm(rawNr), pnBase=normNr(rawNr);
  const remap=PV_REMAP[ps+'|'+pnBase]||PV_REMAP[ps+'|'+pn];
  const ls=remap?norm(remap.street):ps;
  const ln=remap?norm(remap.nr):pn;
  const lnB=remap?normNr(remap.nr):pnBase;
  for(const tk of TRAFO_KREISE){
    if(tk.addresses.some(a=>{
      if(norm(a.street)!==ls) return false;
      const an=norm(a.nr),anB=normNr(a.nr);
      return an===ln||an===lnB||anB===ln||anB===lnB;
    })) return tk;
  }
  return null;
}

function parsePV(f,lon,lat){
  const addr=f.attributes.address||'';
  const clean=addr.split(',')[0].trim().replace(/\s*\+\s*\S.*$/,'').trim();
  const m=clean.match(/^(.+?)\s+(\d+\S*)$/);
  return{id:f.id,address:addr,street:m?m[1].trim():'',nr:m?m[2].trim():'',lat,lon,
    power:parseFloat(f.attributes.total_power)||0,date:(f.attributes.beginning_of_operation||'').split('.').pop()};
}

async function loadPV(){
  try{
    const c=JSON.parse(localStorage.getItem(CACHE_PV)||'null');
    if(c&&c.length>20){pvData=c;renderAll();setStatus('done',pvData.length+' PV-Anlagen (Cache)');return;}
  }catch(e){}
  try{
    const r=await fetch(BFE_URL);
    const d=await r.json();
    const results=(d.results||[]).filter(f=>(f.attributes.address||'').includes('4654'));
    const withGeo=results.filter(f=>f.geometry);
    const noGeo=results.filter(f=>!f.geometry);
    for(const f of withGeo) pvData.push(parsePV(f,f.geometry.x,f.geometry.y));
    renderAll();
    setStatus('loading',pvData.length+' geladen, '+noGeo.length+' werden geocodiert...');
    for(let i=0;i<noGeo.length;i+=5){
      const batch=noGeo.slice(i,i+5);
      const res=await Promise.all(batch.map(async f=>{
        const addr=f.attributes.address||'';
        const q=encodeURIComponent(addr.split(',')[0]+' Lostorf');
        try{
          const r2=await fetch(GEO_URL+'?searchText='+q+'&type=locations&limit=1&sr=4326');
          const d2=await r2.json();
          if(d2.results&&d2.results.length){const a=d2.results[0].attrs;if(a.lat&&a.lon)return parsePV(f,a.lon,a.lat);}
        }catch(e){}
        return null;
      }));
      for(const pv of res){if(!pv)continue;pvData.push(pv);addPVMarker(pv);addPVItem(pv);}
      setStatus('loading',pvData.length+' geladen...');
      await sleep(300);
    }
    try{localStorage.setItem(CACHE_PV,JSON.stringify(pvData));}catch(e){}
    const matched=pvData.filter(p=>findTrafo(p)).length;
    document.getElementById('h-pv').textContent=pvData.length;
    document.getElementById('h-match').textContent=matched;
    setStatus('done',pvData.length+' PV-Anlagen · '+matched+' Trafo-Kreise gematcht');
  }catch(e){setStatus('done','Fehler beim Laden – Netzwerk prüfen');}
}

function renderAll(){
  document.getElementById('pv-loader').style.display='none';
  document.getElementById('pv-list').innerHTML='';
  pvData.forEach(pv=>{addPVMarker(pv);addPVItem(pv);});
  document.getElementById('h-pv').textContent=pvData.length;
  document.getElementById('h-match').textContent=pvData.filter(p=>findTrafo(p)).length;
  buildTrafoList();
}

function addPVMarker(pv){
  if(!pv.lat||!pv.lon) return;
  const tk=findTrafo(pv);
  const m=L.marker([pv.lat,pv.lon],{icon:pvIcon(tk?tk.color:null),zIndexOffset:500}).addTo(map);
  const addr=pv.address.split(',')[0];
  const btn=tk?`<div style="margin-top:6px"><button onclick="window.showTrafo('${tk.name.replace(/'/g,"\\'")}');map.closePopup()" style="padding:3px 10px;border-radius:5px;border:1px solid ${tk.color};background:${tk.color}18;color:${tk.color};font-size:11px;cursor:pointer;font-weight:600">Trafo: ${tk.name} →</button></div>`
    :`<div style="font-size:10px;color:#ef4444;margin-top:3px">Kein Trafo-Kreis gefunden</div>`;
  m.bindPopup(`<div class="pp-title">☀️ ${addr}</div><span class="pp-badge pp-pv">PV ANLAGE</span><br><span style="font-size:11px;color:#5C5248"><b>${pv.power} kW</b> · ${pv.date||'–'}</span>${btn}`);
  m.on('click',()=>selectPV(pv));
  pvMarkers[pv.id]=m;
}

function addPVItem(pv){
  const tk=findTrafo(pv);
  const el=document.createElement('div');
  el.className='pv-item';
  el.id='pvi-'+pv.id;
  el.dataset.addr=(pv.address||'').toLowerCase();
  el.innerHTML=`<div class="pv-icon">☀️</div><div class="pv-body"><div class="pv-addr">${pv.address.split(',')[0]}</div><div class="pv-meta">${pv.power} kW · ${pv.date||'–'}</div></div><div class="pv-tdot" style="background:${tk?tk.color:'transparent'}"></div>`;
  el.addEventListener('click',()=>selectPV(pv));
  document.getElementById('pv-list').appendChild(el);
}

function filterPV(q){
  const lq=q.toLowerCase();
  let n=0;
  document.querySelectorAll('.pv-item').forEach(el=>{
    const show=!q||el.dataset.addr.includes(lq);
    el.style.display=show?'':'none';
    if(show)n++;
  });
  document.getElementById('pv-empty').style.display=n===0?'block':'none';
}

function selectPV(pv){
  document.querySelectorAll('.pv-item.active').forEach(e=>e.classList.remove('active'));
  const li=document.getElementById('pvi-'+pv.id);
  if(li){li.classList.add('active');li.scrollIntoView({block:'nearest'});}
  if(pv.lat) map.panTo([pv.lat,pv.lon],{animate:true});
  const tk=findTrafo(pv);
  if(tk) showTrafo(tk.name);
  else{clearTrafo();toast('⚠️ Kein Trafo-Kreis für diese PV-Anlage');}
}

window.showTrafo=async function(name){
  const tk=TRAFO_KREISE.find(t=>t.name===name);
  if(!tk) return;
  clearTrafo();
  map.closePopup();
  activeTrafoName=name;
  document.querySelectorAll('.tk-item').forEach(c=>{
    c.classList.toggle('active',c.dataset.name===name);
    if(c.dataset.name===name) c.style.setProperty('--c',tk.color);
  });
  const panel=document.getElementById('tpanel');
  panel.style.display='block';
  document.getElementById('tp-dot').style.background=tk.color;
  document.getElementById('tp-name').textContent=name;
  document.getElementById('tp-info').textContent=tk.addresses.length+' Adressen · wird geladen...';
  let placed=0;
  const bounds=[];
  for(let i=0;i<tk.addresses.length;i+=6){
    const batch=tk.addresses.slice(i,i+6);
    const res=await Promise.all(batch.map(a=>geocode(a.street,a.nr,'Lostorf')));
    for(let j=0;j<batch.length;j++){
      const pos=res[j];if(!pos)continue;
      const m=L.marker([pos.lat,pos.lon],{icon:houseIcon(tk.color)}).addTo(map);
      m.bindPopup(`<div class="pp-title">${batch[j].street} ${batch[j].nr}</div><span class="pp-badge" style="background:${tk.color}18;color:${tk.color};border:1px solid ${tk.color}60">Trafo: ${name}</span>`);
      activeMarkers.push(m);bounds.push([pos.lat,pos.lon]);placed++;
    }
    document.getElementById('tp-info').textContent=tk.addresses.length+' Adressen · '+placed+' platziert';
    await sleep(200);
  }
  saveGeoCache();
  document.getElementById('tp-info').textContent=tk.addresses.length+' Adressen · '+placed+' auf Karte';
  const all=[...bounds];
  pvData.forEach(pv=>{if(pv.lat&&findTrafo(pv)&&findTrafo(pv).name===name)all.push([pv.lat,pv.lon]);});
  if(all.length>1) map.fitBounds(all,{padding:[50,50]});
  else if(all.length===1) map.setView(all[0],16);
};

function clearTrafo(){
  activeMarkers.forEach(m=>map.removeLayer(m));
  activeMarkers=[];activeTrafoName=null;
  document.querySelectorAll('.tk-item').forEach(c=>c.classList.remove('active'));
  document.getElementById('tpanel').style.display='none';
}
window.closePanel=clearTrafo;

function buildTrafoList(){
  const el=document.getElementById('tk-list');
  el.innerHTML='';
  TRAFO_KREISE.forEach(tk=>{
    const pvs=pvData.filter(p=>findTrafo(p)&&findTrafo(p).name===tk.name);
    const totalKw=pvs.reduce((s,p)=>s+p.power,0);
    const kwStr=totalKw>0?(totalKw>=1000?(totalKw/1000).toFixed(1)+' MW':Math.round(totalKw)+' kW'):'';
    const pvStr=pvs.length>0?pvs.length+' PV':'';
    const d=document.createElement('div');
    d.className='tk-item';d.dataset.name=tk.name;
    d.innerHTML=`
      <div class="tk-dot" style="background:${tk.color}"></div>
      <div class="tk-name">${tk.name}</div>
      <div class="tk-stats">
        ${pvStr?`<span class="tk-cnt">${pvStr}</span>`:'<span class="tk-cnt">'+tk.addresses.length+' Adr.</span>'}
        ${kwStr?`<span class="tk-kw">${kwStr}</span>`:''}
      </div>`;
    d.addEventListener('click',()=>showTrafo(tk.name));
    el.appendChild(d);
  });
}

function setStatus(type,msg){
  const bar=document.getElementById('status-bar');
  bar.className=type==='done'?'done':'';
  document.getElementById('status-txt').textContent=msg;
}
let _tt;
function toast(msg){clearTimeout(_tt);const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';_tt=setTimeout(()=>t.style.display='none',3500);}

loadGeoCache();
buildTrafoList();
loadPV();
</script>
